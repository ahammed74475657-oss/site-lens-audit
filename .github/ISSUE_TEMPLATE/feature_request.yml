name: Feature request
description: Suggest a useful improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What would this help users do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SEO
        - Accessibility
        - Performance
        - Export
        - UI
        - Security
        - Documentation
    validations:
      required: true
